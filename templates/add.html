<!DOCTYPE html>
<html>

<head>

    <title>Add New Part</title>

    <style>

        body{
            font-family:Arial;
            background:#eef2f7;
            padding:40px;
        }

        .box{
            width:700px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 0 15px rgba(0,0,0,0.1);
        }

        h1{
            text-align:center;
            color:#003366;
            margin-bottom:25px;
        }

        input{
            width:100%;
            padding:12px;
            margin-bottom:15px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:15px;
        }

        button{
            width:100%;
            padding:14px;
            background:#003366;
            color:white;
            border:none;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#0055aa;
        }

    </style>

</head>

<body>

    <div class="box">

        <h1>Add New Part</h1>

        <form method="POST">

            <input name="sr_no" placeholder="Sr No" required>

            <input name="part_no" placeholder="Part No" required>

            <input name="rev_date" placeholder="Rev Date">

            <input name="application" placeholder="Application">

            <input name="total_length" placeholder="Total Length">

            <input name="plating_length" placeholder="Plating Length">

            <input name="chrome_before" placeholder="Chrome Before">

            <input name="chrome_after" placeholder="Chrome After">

            <input name="nickel" placeholder="Nickel">

            <input name="piston_end" placeholder="Piston End">

            <input name="plant" placeholder="Plant">

            <input name="identification" placeholder="Identification">

            <button type="submit">

                Save Part

            </button>

        </form>

    </div>

</body>

</html>
