<!DOCTYPE html>
<html>
<head>
    <title>Daily Defect Analysis</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body{
            font-family:Arial;
            background:#eef2f7;
            margin:0;
            padding:30px;
        }

        .container{
            width:95%;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:20px;
            box-shadow:0 5px 20px rgba(0,0,0,0.1);
        }

        h1{
            text-align:center;
            color:#003366;
            margin-bottom:10px;
        }

        h2{
            text-align:center;
            color:#555;
            margin-bottom:30px;
        }

        .back-btn{
            display:inline-block;
            margin-bottom:20px;
            background:#003366;
            color:white;
            padding:10px 20px;
            text-decoration:none;
            border-radius:8px;
        }

        canvas{
            max-height:700px;
        }
    </style>
</head>

<body>

<div class="container">

    <a href="/" class="back-btn">← Back To Portal</a>

    <h1>Daily Defect Analysis</h1>
    <h2>Date: {{ latest_date }}</h2>

    <canvas id="defectChart"></canvas>

</div>

<script>
const ctx = document.getElementById('defectChart');

new Chart(ctx, {
    type: 'bar',

    data: {
        labels: {{ defects | tojson }},
        datasets: [{
            label: 'Defect Qty',
            data: {{ values | tojson }},
            borderWidth: 1
        }]
    },

    options: {
        indexAxis: 'y',
        responsive: true,
        plugins: {
            legend: {
                display: false
            }
        },
        scales: {
            x: {
                beginAtZero: true
            }
        }
    }
});
</script>

</body>
</html>
