<!DOCTYPE html>
<html>

<head>

    <title>Login</title>

    <style>

        body{
            font-family:Arial;
            background:#eef2f7;
        }

        .login-box{
            width:350px;
            margin:120px auto;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 0 15px rgba(0,0,0,0.1);
        }

        h1{
            text-align:center;
            color:#003366;
        }

        input{
            width:100%;
            padding:12px;
            margin-top:15px;
            border:1px solid #ccc;
            border-radius:8px;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:20px;
            background:#003366;
            color:white;
            border:none;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
        }

        .error{
            color:red;
            text-align:center;
            margin-top:10px;
        }

    </style>

</head>

<body>

    <div class="login-box">

        <h1>Admin Login</h1>

        <form method="POST">

            <input type="text"
                   name="username"
                   placeholder="Username"
                   required>

            <input type="password"
                   name="password"
                   placeholder="Password"
                   required>

            <button type="submit">

                Login

            </button>

        </form>

        <div class="error">

            {{ error }}

        </div>

    </div>

</body>

</html>
